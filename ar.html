<!DOCTYPE html>
<html>

<head>

    <meta charset="utf-8">

    <title>Mario Fortress AR</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

</head>

<body>

    <a-scene mindar-image="imageTargetSrc:targets.mind" embedded color-space="sRGB" vr-mode-ui="enabled:false" device-orientation-permission-ui="enabled:false">


        <a-assets>

            <img id="brick"
                src="https://cdn.jsdelivr.net/gh/aframevr/sample-assets/assets/images/bricks/brick_bump.jpg">

        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled:false">

        </a-camera>

        <a-entity mindar-image-target="targetIndex:0">


            <a-box position="0 0 0" width="1" height="0.6" depth="1" material="src:#brick;repeat:2 2">

            </a-box>

            <a-cylinder position="-0.6 0.1 -0.6" radius="0.15" height="0.7" src="#brick">

            </a-cylinder>


            <a-cylinder position="0.6 0.1 -0.6" radius="0.15" height="0.7" src="#brick">

            </a-cylinder>


            <a-cylinder position="-0.6 0.1 0.6" radius="0.15" height="0.7" src="#brick">

            </a-cylinder>


            <a-cylinder position="0.6 0.1 0.6" radius="0.15" height="0.7" src="#brick">

            </a-cylinder>
            <a-cone position="-0.6 0.7 -0.6" radius-bottom="0.2" height="0.25" color="red">

            </a-cone>

            <a-cone position="0.6 0.7 -0.6" radius-bottom="0.2" height="0.25" color="red">

            </a-cone>

            <a-cone position="-0.6 0.7 0.6" radius-bottom="0.2" height="0.25" color="red">

            </a-cone>

            <a-cone position="0.6 0.7 0.6" radius-bottom="0.2" height="0.25" color="red">

            </a-cone>

            <a-cylinder position="0 0.9 0" radius="0.02" height="1" color="gray">

            </a-cylinder>

            <a-plane position="0.25 0.5 0" width="0.5" height="0.15" color="white" text="value:Thank You Mario;color:black;width:3">

                <a-animation attribute="position" from="0.25 0.2 0" to="0.25 0.9 0" dur="3000" fill="forwards">

                </a-animation>

                <a-animation attribute="rotation" from="0 -5 0" to="0 5 0" begin="3000" direction="alternate" repeat="indefinite" dur="500">

                </a-animation>

            </a-plane>

        </a-entity>

    </a-scene>

</body>

</html>
