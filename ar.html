<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Mario Fortress MindAR</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>

<body>

<a-scene
  mindar-image="imageTargetSrc: targets.mind; autoStart: true;"
  color-space="sRGB"
  renderer="colorManagement: true, physicallyCorrectLights"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true">

  <a-assets>
    <img id="brick" src="https://cdn.jsdelivr.net/gh/aframevr/sample-assets/assets/images/bricks/brick_bump.jpg">
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-light type="ambient" intensity="1.2"></a-light>
  <a-light type="directional" position="2 4 3" intensity="2"></a-light>

  <a-entity mindar-image-target="targetIndex: 0">

    <a-plane rotation="-90 0 0" width="2" height="2" color="#72b66b"></a-plane>

    <a-box position="0 0.3 0" width="0.6" height="0.4" depth="0.6"
           material="src:#brick; repeat:2 2"></a-box>

    <a-cylinder position="-0.25 0.25 -0.25" radius="0.12" height="0.5" material="src:#brick"></a-cylinder>
    <a-cylinder position="0.25 0.25 -0.25" radius="0.12" height="0.5" material="src:#brick"></a-cylinder>
    <a-cylinder position="-0.25 0.25 0.25" radius="0.12" height="0.5" material="src:#brick"></a-cylinder>
    <a-cylinder position="0.25 0.25 0.25" radius="0.12" height="0.5" material="src:#brick"></a-cylinder>

    <a-cone position="-0.25 0.55 -0.25" radius-bottom="0.17" height="0.2" color="#cc0000"></a-cone>
    <a-cone position="0.25 0.55 -0.25" radius-bottom="0.17" height="0.2" color="#cc0000"></a-cone>
    <a-cone position="-0.25 0.55 0.25" radius-bottom="0.17" height="0.2" color="#cc0000"></a-cone>
    <a-cone position="0.25 0.55 0.25" radius-bottom="0.17" height="0.2" color="#cc0000"></a-cone>

    <a-cylinder position="0 0.7 0" radius="0.01" height="0.8" color="#666666"></a-cylinder>

    <a-entity position="0 0.05 0"
      animation="property: position; from: 0 0.05 0; to: 0 1 0; dur: 8000; easing: easeOutQuad">

      <a-plane position="0.15 0 0"
        width="0.4"
        height="0.2"
        color="#ffffff"
        animation="property: rotation; from: 0 0 -10; to: 0 0 10; dir: alternate; loop: true; dur: 300">
      </a-plane>

      <a-text
        value="Thank You Mario\nBut Our Princess Is in\nAnother Castle"
        position="0 0 0.01"
        align="center"
        color="black"
        width="1.5">
      </a-text>

    </a-entity>

  </a-entity>

</a-scene>

</body>
</html>
