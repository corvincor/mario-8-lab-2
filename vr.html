<!DOCTYPE html>
<html>

<head>

    <meta charset="utf-8">

    <title>Mario Fortress VR</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

</head>

<body>

    <a-scene>

        <a-assets>

            <img id="brick"
                src="https://cdn.jsdelivr.net/gh/aframevr/sample-assets/assets/images/bricks/brick_bump.jpg">

        </a-assets>

        <a-light type="ambient" intensity="1">
        </a-light>

        <a-light type="directional" position="5 10 5" intensity="2">
        </a-light>

        <a-plane rotation="-90 0 0" width="50" height="50" color="#6ca96c">

        </a-plane>

        <a-box position="0 3 0" width="8" height="6" depth="8" material="src:#brick;repeat:2 2;roughness:0.9">

        </a-box>

        <a-cylinder position="-5 4 -5" radius="1.5" height="8" material="src:#brick;repeat:1 2">

        </a-cylinder>

        <a-cone position="-5 9 -5" radius-bottom="2" height="3" color="#AA0000">

        </a-cone>

        <a-cylinder position="5 4 -5" radius="1.5" height="8" material="src:#brick;repeat:1 2">

        </a-cylinder>

        <a-cone position="5 9 -5" radius-bottom="2" height="3" color="#AA0000">

        </a-cone>

        <a-cylinder position="-5 4 5" radius="1.5" height="8" material="src:#brick;repeat:1 2">

        </a-cylinder>

        <a-cone position="-5 9 5" radius-bottom="2" height="3" color="#AA0000">

        </a-cone>

        <a-cylinder position="5 4 5" radius="1.5" height="8" material="src:#brick;repeat:1 2">

        </a-cylinder>

        <a-cone position="5 9 5" radius-bottom="2" height="3" color="#AA0000">

        </a-cone>

        <a-cylinder position="0 10 0" radius="0.1" height="10" color="gray">

        </a-cylinder>



        <a-plane id="flag" position="3 5 0" width="6" height="2" color="white" text="value:Thank You Mario But Our Princess Is in Another Castle;color:black;width:10;wrapCount:25">

            <a-animation attribute="position" from="3 5 0" to="3 10 0" dur="4000" fill="forwards">

            </a-animation>

            <a-animation attribute="rotation" from="0 -5 0" to="0 5 0" begin="4000" direction="alternate"
                repeat="indefinite" dur="500">

            </a-animation>

        </a-plane>

        <a-camera position="0 8 20">

        </a-camera>

    </a-scene>

</body>

</html>
