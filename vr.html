<!DOCTYPE html>
<html>

<head>

    <meta charset="utf-8">

    <title>Mario Fortress VR</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

</head>

<body>

    <a-scene background="color:#87CEEB">

        <a-assets>

            <img id="brick"
                src="https://cdn.jsdelivr.net/gh/aframevr/sample-assets/assets/images/bricks/brick_bump.jpg">

        </a-assets>

        <a-light type="ambient" intensity="1.2">
        </a-light>

        <a-light type="directional" position="10 15 10" intensity="2">
        </a-light>

        <a-plane rotation="-90 0 0" width="50" height="50" color="#72b66b">
        </a-plane>

        <a-box position="0 3 0" width="8" height="6" depth="8" material="src:#brick; repeat:2 2">
        </a-box>

        <a-cylinder position="-5 4 -5" radius="1.5" height="8" material="src:#brick; repeat:1 2">
        </a-cylinder>

        <a-cone position="-5 9.5 -5" radius-bottom="2" height="3" color="#cc0000">
        </a-cone>

        <a-cylinder position="5 4 -5" radius="1.5" height="8" material="src:#brick; repeat:1 2">
        </a-cylinder>

        <a-cone position="5 9.5 -5" radius-bottom="2" height="3" color="#cc0000">
        </a-cone>

        <a-cylinder position="-5 4 5" radius="1.5" height="8" material="src:#brick; repeat:1 2">
        </a-cylinder>

        <a-cone position="-5 9.5 5" radius-bottom="2" height="3" color="#cc0000">
        </a-cone>

        <a-cylinder position="5 4 5" radius="1.5" height="8" material="src:#brick; repeat:1 2">
        </a-cylinder>

        <a-cone position="5 9.5 5" radius-bottom="2" height="3" color="#cc0000">
        </a-cone>

        <a-cylinder position="0 11 0" radius="0.08" height="12" color="#666666">
        </a-cylinder>

        <a-entity position="0 5 0" animation="property:position;from:0 5 0;to:0 18 0;dur:5000;easing:linear" animation__wave="property:rotation;from:0 0 -2;to:0 0 2;delay:5000;dir:alternate;loop:true;dur:300">

            <a-plane position="3 0 0" width="8" height="3" color="#ffffff" side="double">

            </a-plane>

            <a-entity position="3 0 0.01" text="value:Thank You Mario But Our Princess Is in Another Castle;align:center;anchor:center;color:black;width:7;wrapCount:16">

            </a-entity>

        </a-entity>

        <a-camera position="0 8 20">
        </a-camera>

    </a-scene>

</body>

</html>
